name: Deploy notebooks to Databricks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Databricks Repo to main branch
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          REPO_ID=$(curl -sf "${DATABRICKS_HOST}/api/2.0/repos" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          repo = next(r for r in data.get('repos', []) if 'databricks_repo' in r.get('path', ''))
          print(repo['id'])
          ")
          echo "Syncing repo ID: $REPO_ID"
          curl -sf -X PATCH "${DATABRICKS_HOST}/api/2.0/repos/${REPO_ID}" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'
          echo "Databricks Repo synced to latest main"
